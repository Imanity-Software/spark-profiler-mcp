name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    name: build & test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      # End-to-end stdio check (example.sparkprofile is committed); run once.
      - name: smoke (MCP over stdio)
        if: ${{ matrix.node == 20 }}
        run: npm run smoke
