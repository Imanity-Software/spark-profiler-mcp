name: Publish to npm

# Publishes to npm whenever you push a version tag, e.g.  git tag v0.1.1 && git push origin v0.1.1
# Auth is via npm Trusted Publishing (GitHub OIDC) — NO npm token/secret is used.
# One-time setup on npmjs.com: package → Settings → Trusted Publisher → GitHub Actions,
#   Organization: Imanity-Software, Repository: spark-profiler-mcp, Workflow: publish.yml
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for OIDC / Trusted Publishing + automatic provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # Trusted Publishing requires Node >= 22.14.0
          registry-url: "https://registry.npmjs.org"

      # Node 22 ships npm 10.x; Trusted Publishing requires npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm test

      # OIDC-authenticated (no NODE_AUTH_TOKEN). Provenance is generated automatically —
      # no --provenance flag needed.
      - run: npm publish --access public
